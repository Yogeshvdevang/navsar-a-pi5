use_mavlink: true
use_barometer: true
use_imu_fusion: true
use_sensor_fusion: false
device: /dev/ttyACM0
baud: 115200
attitude_rate_hz: 30.0
fallback_altitude_m: 1.0
altitude_offset_m: -0.141
final_altitude_offset_m: 0
barometer:
  rate_hz: 25.0
  messages:
  - SCALED_PRESSURE
  - SCALED_PRESSURE2
  - SCALED_PRESSURE3
  - HIGHRES_IMU
mavlink_source:
  system_id: 1
  component_id: 192
  rangefinder_component_id: 191
gps_drift_threshold_m: 5.0
gps_timeout_s: 2.0
gps_min_fix_type: 3
gps_input:
  enabled: true
  port: /dev/ttyAMA5
  baud: 230400
  format: auto
  startup_wait_s: 5
  init_wait_s: 3
  min_fix_type: 3
odom_gps_send_interval_s: 0.2
odom_gps_fix_type: 3
odom_gps_sats: 10
odometry_send_interval_s: 0.04
output_mode: optical_flow_gps_port
vio_mode: vo
vio_imu:
  print: true
  print_interval_s: 0.5
gps_serial:
  enabled: false
  port: /dev/serial0
  baud: 9600
  format: auto
optical_flow:
  enabled: true
  data_mode: stable
  port: /dev/ttyAMA3
  baud: 115200
  rate_hz: 60.0
  altitude_offset_m: 500.0
  heartbeat_interval_s: 0.6
  print: true
  max_flow_raw: 120
  altitude_scale: 1.1
  altitude_smoothing_alpha: 0.35
  altitude_jump_limit_m: 0.12
  altitude_deadband_m: 0.0005
  altitude_min_m: 0.0
  altitude_max_m: 8.0
optical_flow_mavlink:
  send_interval_s: 0.05
  print: true
  range_min_m: 0.01
  range_max_m: 8.0
  min_quality: 30
  max_speed_mps: 0.6
  deadband_mps: 0.01
  smoothing_alpha: 0.08
  stationary_speed_mps: 0.03
  stationary_samples: 30
  stationary_quality_min: 30
  speed_scale: 0.01
optical_flow_vo:
  switch_m: 8.0
  optical_flow_output_mode: optical_flow_gps_port
  vo_output_mode: gps_mavlink
imu:
  enabled: true # Master switch for optical_gps_port_imu using Pixhawk's built-in IMU over MAVLink.
  chip: MPU6050 # Legacy field; ignored when using Pixhawk built-in IMU.
  i2c_bus: 1 # Legacy field; ignored when using Pixhawk built-in IMU.
  i2c_address: 0x68 # Legacy field; ignored when using Pixhawk built-in IMU.
  f_pixels: 16.0 # Focal length in pixels for gyro compensation.
  imu_beta: 0.05 # Complementary fusion weight for accelerometer-derived velocity.
  gyro_comp_enabled: true # Insert Point A: gyro compensation on optical flow.
  accel_fuse_enabled: true # Insert Point B: accelerometer fusion on body velocity.
  tilt_corr_enabled: true # Insert Point C: tilt correction on range altitude.
compass:
  enabled: true
  mode: i2c
  i2c_bus: 1
  calibration_file: tools/compass_calibration.json
  rate_hz: 10
  print: true
  send_mavlink: true
  heading_offset_deg: 0
  heading_smoothing_alpha: 0.1
  heading_max_delta_deg: 5.0
  heading_jump_reject_deg: 20.0
gps_output:
  enabled: true
  format: ubx
  port: /dev/ttyAMA0
  baud: 230400
  rate_hz: 10
  heading_mode: send
  ubx_h_acc_mm: 500
  ubx_v_acc_mm: 100
  fix_quality: 1
  min_sats: 10
  max_sats: 20
  update_s: 7
  print: true
  raw_print: true
gps_passthrough:
  input_port: /dev/ttyAMA5
  input_baud: 230400
  output_port: /dev/ttyAMA0
  output_baud: 230400
  log_dir: data/gps_passthrough_logs
  print: true
vps_gps:
  send_interval_s: 0.1
  mavlink_send_interval_s: 0.1
  fix_type: 3
  satellites: 10
  print: false
  use_compass_yaw: true
  ignore_flags: 28
calibration:
  enabled: true
  gps_live_graph: true
  vo_height_scaling:
    enabled: false
    reference_height_m: 1.0
    power: 1.0
    min_factor: 0.3
    max_factor: 5.0
  optical_gps_tuning:
    lat_scale: 1.0
    lon_scale: 1.0
    alt_offset_m: 0.0
    vo_scale: 1.0
    vo_lat_scale: 1.0
    vo_lon_scale: 1.0
print_gps_values: false
print_baro_values: false
print_sensor_values: true
print_interval_s: 0.5
gnss_monitor:
  spoof_detector:
    enabled: false
    drift_threshold_m: 5.0
    max_speed_mps: 25.0
    consecutive: 3
    cooldown_s: 2.0
    min_fix_type: 3
  spoof_reporter:
    enabled: false
    log_path: data/spoof_events.jsonl
    gcs_severity: warning
    min_interval_s: 2.0
gps_origin:
  lat: 12.0
  lon: 40.0
  alt: 0.0
